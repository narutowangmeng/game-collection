<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>连连看 · Match Pairs</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
      color: #fff;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    .top-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px; background: rgba(0,0,0,0.2);
    }
    .back-btn { color: #fff; text-decoration: none; font-size: 1.4rem; }
    .top-title { font-size: 1.1rem; font-weight: 600; }
    .remain { font-size: 0.9rem; color: #fbbf24; }

    .stats {
      display: flex; justify-content: space-around;
      padding: 12px; background: rgba(0,0,0,0.1);
    }
    .stat { text-align: center; }
    .stat-lbl { font-size: 0.75rem; color: #9ca3af; }
    .stat-val { font-size: 1.2rem; font-weight: 600; }
    .score { color: #fbbf24; }

    .msg {
      text-align: center; padding: 10px;
      font-size: 0.9rem; color: #9ca3af;
    }

    .board-wrap {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 10px;
    }
    .board {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 6px;
      width: 100%; max-width: 360px;
      aspect-ratio: 4/3;
    }
    .tile {
      display: flex; align-items: center; justify-content: center;
      font-size: 1.8rem;
      background: rgba(255,255,255,0.15);
      border-radius: 8px;
      cursor: pointer;
      user-select: none;
      transition: all 0.1s;
      border: 2px solid transparent;
    }
    .tile:active { transform: scale(0.95); }
    .tile.selected {
      border-color: #fbbf24;
      background: rgba(251,191,36,0.2);
    }
    .tile.empty { visibility: hidden; pointer-events: none; }

    .controls {
      display: flex; gap: 10px; padding: 16px;
      background: rgba(0,0,0,0.15);
    }
    .btn {
      flex: 1; padding: 14px; border: none; border-radius: 10px;
      font-size: 0.95rem; cursor: pointer;
      background: rgba(255,255,255,0.1); color: #fff;
    }
    .btn:active { background: rgba(255,255,255,0.2); }
  </style>
</head>
<body>

<div class="top-bar">
  <a href="index.html" class="back-btn">←</a>
  <div class="top-title">连连看 · Match Pairs</div>
  <div class="remain" id="remainEl">12对</div>
</div>

<div class="stats">
  <div class="stat">
    <div class="stat-lbl">剩余</div>
    <div class="stat-val" id="cntEl">12</div>
  </div>
  <div class="stat">
    <div class="stat-lbl">分数</div>
    <div class="stat-val score" id="scoreEl">0</div>
  </div>
  <div class="stat">
    <div class="stat-lbl">时间</div>
    <div class="stat-val" id="timeEl">0:00</div>
  </div>
</div>

<div class="msg" id="msgEl">选择两个相同的图案消除</div>

<div class="board-wrap">
  <div class="board" id="board"></div>
</div>

<div class="controls">
  <button class="btn" onclick="hint()">💡 提示</button>
  <button class="btn" onclick="shuffle()">🔀 重排</button>
  <button class="btn" onclick="newGame()">🆕 新游戏</button>
</div>

<script>
const COLS = 6, ROWS = 4;
const TOTAL = COLS * ROWS;
const PAIRS = TOTAL / 2;

// 使用简单的 emoji 图标
const ICONS = ['🍎','🍊','🍋','🍇','🍓','🍒','🥝','🍑','🍌','🌸','🌺','⭐'];

let tiles = [];
let selected = null;
let score = 0;
let timer = null;
let seconds = 0;

const boardEl = document.getElementById('board');
const scoreEl = document.getElementById('scoreEl');
const cntEl = document.getElementById('cntEl');
const remainEl = document.getElementById('remainEl');
const timeEl = document.getElementById('timeEl');
const msgEl = document.getElementById('msgEl');

function newGame() {
  // 生成成对的图标
  let icons = [];
  for (let i = 0; i < PAIRS; i++) {
    const icon = ICONS[i % ICONS.length];
    icons.push(icon, icon);
  }
  // 随机打乱
  for (let i = icons.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [icons[i], icons[j]] = [icons[j], icons[i]];
  }
  
  tiles = [];
  for (let r = 0; r < ROWS; r++) {
    tiles[r] = [];
    for (let c = 0; c < COLS; c++) {
      tiles[r][c] = icons[r * COLS + c];
    }
  }
  
  selected = null;
  score = 0;
  seconds = 0;
  
  if (timer) clearInterval(timer);
  timer = setInterval(() => {
    seconds++;
    const m = Math.floor(seconds / 60);
    const s = seconds % 60;
    timeEl.textContent = m + ':' + (s < 10 ? '0' : '') + s;
  }, 1000);
  
  render();
  updateCount();
}

function render() {
  boardEl.innerHTML = '';
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const tile = document.createElement('div');
      tile.className = 'tile' + (tiles[r][c] ? '' : ' empty');
      tile.textContent = tiles[r][c] || '';
      tile.dataset.r = r;
      tile.dataset.c = c;
      
      if (selected && selected.r === r && selected.c === c) {
        tile.classList.add('selected');
      }
      
      tile.onclick = () => onTileClick(r, c);
      boardEl.appendChild(tile);
    }
  }
}

function onTileClick(r, c) {
  const icon = tiles[r][c];
  if (!icon) return;
  
  // 如果点击已选中的，取消选中
  if (selected && selected.r === r && selected.c === c) {
    selected = null;
    render();
    return;
  }
  
  if (!selected) {
    selected = { r, c };
    render();
    return;
  }
  
  // 检查是否相同
  const first = selected;
  const second = { r, c };
  
  if (tiles[first.r][first.c] === icon) {
    // 相同，检查能否消除
    if (canConnect(first.r, first.c, second.r, second.c)) {
      // 消除
      tiles[first.r][first.c] = null;
      tiles[second.r][second.c] = null;
      selected = null;
      score += 10;
      render();
      updateCount();
      
      // 检查胜利
      if (checkWin()) {
        msgEl.textContent = '🎉 恭喜通关！';
        clearInterval(timer);
      }
    } else {
      // 不能消除，选新的
      selected = { r, c };
      render();
    }
  } else {
    selected = { r, c };
    render();
  }
}

// 简单的连通性检查：允许直线或一折
function canConnect(r1, c1, r2, c2) {
  // 同行同列直接检查
  if (r1 === r2) {
    if (clearLine(r1, c1, r2, c2)) return true;
  }
  if (c1 === c2) {
    if (clearLineCol(r1, c1, r2, c2)) return true;
  }
  
  // 一折：先水平后垂直
  // 尝试 (r1, c2) 作为拐点
  if (tiles[r1][c2] === null && clearLine(r1, c1, r1, c2) && clearLineCol(r1, c2, r2, c2)) return true;
  // 尝试 (r2, c1) 作为拐点
  if (tiles[r2][c1] === null && clearLineCol(r1, c1, r2, c1) && clearLine(r2, c1, r2, c2)) return true;
  
  return false;
}

// 检查行是否畅通
function clearLine(r, c1, c2) {
  const lo = Math.min(c1, c2), hi = Math.max(c1, c2);
  for (let c = lo + 1; c < hi; c++) {
    if (tiles[r][c] !== null) return false;
  }
  return true;
}

// 检查列是否畅通
function clearLineCol(r1, c, r2) {
  const lo = Math.min(r1, r2), hi = Math.max(r1, r2);
  for (let r = lo + 1; r < hi; r++) {
    if (tiles[r][c] !== null) return false;
  }
  return true;
}

function updateCount() {
  let cnt = 0;
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (tiles[r][c]) cnt++;
    }
  }
  const pairs = cnt / 2;
  cntEl.textContent = pairs;
  remainEl.textContent = pairs + '对';
  scoreEl.textContent = score;
}

function hint() {
  // 找一对可以消除的
  let list = [];
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (tiles[r][c]) list.push({ r, c, icon: tiles[r][c] });
    }
  }
  
  for (let i = 0; i < list.length; i++) {
    for (let j = i + 1; j < list.length; j++) {
      if (list[i].icon === list[j].icon) {
        if (canConnect(list[i].r, list[i].c, list[j].r, list[j].c)) {
          // 高亮显示
          selected = list[i];
          render();
          setTimeout(() => {
            selected = list[j];
            render();
          }, 500);
          return;
        }
      }
    }
  }
  msgEl.textContent = '没有可消除的对子，请重排';
}

function shuffle() {
  // 收集剩余的图标
  let list = [];
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (tiles[r][c]) list.push(tiles[r][c]);
    }
  }
  // 重新打乱
  for (let i = list.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [list[i], list[j]] = [list[j], list[i]];
  }
  // 放回
  let idx = 0;
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (tiles[r][c]) {
        tiles[r][c] = list[idx++];
      }
    }
  }
  selected = null;
  render();
}

function checkWin() {
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (tiles[r][c]) return false;
    }
  }
  return true;
}

newGame();
</script>
</body>
</html>
