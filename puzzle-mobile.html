<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>拼图游戏 · Puzzle</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    .top-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px; background: rgba(0,0,0,0.2);
    }
    .back-btn { color: #fff; text-decoration: none; font-size: 1.4rem; }
    .top-title { font-size: 1.1rem; font-weight: 600; }
    .moves { font-size: 0.9rem; color: #fbbf24; }

    .game-area {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 15px;
    }
    .puzzle-container {
      width: 100%; max-width: 360px;
      aspect-ratio: 1;
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    }
    .puzzle {
      width: 100%; height: 100%;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
    }
    .piece {
      position: relative;
      background-size: 300% 300%;
      cursor: pointer;
      transition: transform 0.15s;
    }
    .piece:active { transform: scale(0.96); }
    .piece.empty { 
      background: rgba(0,0,0,0.2); 
      cursor: default;
    }
    .piece.empty:active { transform: none; }

    .controls {
      display: flex; gap: 10px; padding: 16px;
      background: rgba(0,0,0,0.15);
    }
    .btn {
      flex: 1; padding: 14px; border: none; border-radius: 10px;
      font-size: 0.95rem; cursor: pointer;
      background: rgba(255,255,255,0.1); color: #fff;
    }
    .btn:active { transform: scale(0.97); }

    .msg {
      text-align: center; padding: 8px;
      font-size: 0.9rem; color: #9ca3af;
    }
    .win-msg {
      color: #4ade80; font-weight: 600;
      font-size: 1.1rem;
    }
  </style>
</head>
<body>

<div class="top-bar">
  <a href="index.html" class="back-btn">←</a>
  <div class="top-title">拼图游戏 · Puzzle</div>
  <div class="moves" id="movesEl">0 步</div>
</div>

<div class="msg" id="msgEl">点击空白块相邻的方块移动</div>

<div class="game-area">
  <div class="puzzle-container">
    <div class="puzzle" id="puzzle"></div>
  </div>
</div>

<div class="controls">
  <button class="btn" onclick="shuffle()">🔀 打乱</button>
  <button class="btn" onclick="newGame()">🆕 新游戏</button>
</div>

<script>
// 使用 base64 小马宝莉图片
const IMAGE = 'data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIzMDAiIGhlaWdodD0iMzAwIj48cmVjdCB3aWR0aD0iMzAwIiBoZWlnaHQ9IjMwMCIgZmlsbD0iI2Y1ZjVmNSIvPjxyZWwgeDE9IjEwJSIgeTE9IjEwJSIgeDI9IjkwJSIgeTI9IjkwJSI+PHJlY3Qgd2lkdGg9IjEwMCIgaGVpZ2h0PSIxMDAiIGZpbGw9IiM1ZTY3Y2IiLz48cmVjdCB4PSIxMDAiIHdpZHRoPSIxMDAiIGhlaWdodD0iMTAwIiBmaWxsPSIjZDQ4NWViIi8+PHJlY3QgeDI9IjIwMCIgd2lkdGg9IjEwMCIgaGVpZ2h0PSIxMDAiIGZpbGw9IiNmOWM1MjMiLz48cmVjdCB4PSIzMCIgeT0iMTAwIiB3aWR0aD0iMTAwIiBoZWlnaHQ9IjEwMCIgZmlsbD0iI2M3Yzc0MyIvPjxyZWN0IHg9IjEwMCIgeT0iMTAwIiB3aWR0aD0iMTAwIiBoZWlnaHQ9IjEwMCIgZmlsbD0iIzRkOGFiYiIvPjxyZWN0IHgyPSIyMDAiIHk9IjEwMCIgd2lkdGg9IjEwMCIgaGVpZ2h0PSIxMDAiIGZpbGw9IiM4NjM5NDgiLz48cmVjdCB5PSIyMDAiIHdpZHRoPSIxMDAiIGhlaWdodD0iMTAwIiBmaWxsPSIjNWQ3ZDZiIi8+PHJlY3QgeD0iMTAwIiB5PSIyMDAiIHdpZHRoPSIxMDAiIGhlaWdodD0iMTAwIiBmaWxsPSIjOTQ2NzZkIi8+PHJlY3QgeDI9IjIwMCIgeT0iMjAwIiB3aWR0aD0iMTAwIiBoZWlnaHQ9IjEwMCIgZmlsbD0iI2EwOTkzYyIvPjwvcmVsPjxyZWwgeDE9IjEwJSIgeTE9IjEwJSIgeDI9IjkwJSIgeTI9IjkwJSI+PHJlY3Qgd2lkdGg9IjEwMCIgaGVpZ2h0PSIxMDAiIGZpbGw9IiM4YjVjZTciLz48cmVjdCB4PSIxMDAiIHdpZHRoPSIxMDAiIGhlaWdodD0iMTAwIiBmaWxsPSIjZmZmZmZmIi8+PHJlY3QgeDI9IjIwMCIgd2lkdGg9IjEwMCIgaGVpZ2h0PSIxMDAiIGZpbGw9IiNjY2NjY2MiLz48L3JlYj48L3N2Zz4=';

const SIZE = 3;
let tiles = []; // 当前布局 [0,1,2,3,4,5,6,7,8]
let emptyPos = 8; // 空白块位置
let moves = 0;
let won = false;

const puzzleEl = document.getElementById('puzzle');
const movesEl = document.getElementById('movesEl');
const msgEl = document.getElementById('msgEl');

function init() {
  tiles = [0,1,2,3,4,5,6,7,8];
  emptyPos = 8;
  moves = 0;
  won = false;
  shuffle();
}

function shuffle() {
  // 随机移动 100 次确保可解
  for (let i = 0; i < 100; i++) {
    const adj = getAdjacent(emptyPos);
    const random = adj[Math.floor(Math.random() * adj.length)];
    swap(random, emptyPos);
    emptyPos = random;
  }
  moves = 0;
  won = false;
  render();
}

function getAdjacent(pos) {
  const r = Math.floor(pos / SIZE);
  const c = pos % SIZE;
  const adj = [];
  if (r > 0) adj.push(pos - SIZE); // 上
  if (r < SIZE - 1) adj.push(pos + SIZE); // 下
  if (c > 0) adj.push(pos - 1); // 左
  if (c < SIZE - 1) adj.push(pos + 1); // 右
  return adj;
}

function swap(i, j) {
  [tiles[i], tiles[j]] = [tiles[j], tiles[i]];
}

function onPieceClick(pos) {
  if (won) return;
  const adj = getAdjacent(emptyPos);
  if (!adj.includes(pos)) return;
  
  swap(pos, emptyPos);
  emptyPos = pos;
  moves++;
  
  render();
  checkWin();
}

function checkWin() {
  const win = tiles.every((t, i) => t === i);
  if (win) {
    won = true;
    msgEl.textContent = '🎉 恭喜完成！';
    msgEl.className = 'msg win-msg';
  }
}

function render() {
  puzzleEl.innerHTML = '';
  for (let i = 0; i < SIZE * SIZE; i++) {
    const piece = document.createElement('div');
    piece.className = 'piece';
    
    const tileNum = tiles[i];
    if (tileNum === 8) {
      piece.classList.add('empty');
    } else {
      const row = Math.floor(tileNum / SIZE);
      const col = tileNum % SIZE;
      piece.style.backgroundImage = `url(${IMAGE})`;
      piece.style.backgroundPosition = `${-col * 100}% ${-row * 100}%`;
    }
    
    piece.onclick = () => onPieceClick(i);
    puzzleEl.appendChild(piece);
  }
  
  movesEl.textContent = moves + ' 步';
  if (!won) msgEl.className = 'msg';
}

function newGame() {
  init();
}

init();
</script>
</body>
</html>
