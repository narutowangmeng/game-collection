<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>小马宝莉拼图</title>
<style>
  :root {
    --bg: #0d0a1e; --surface: #181030; --card: #100e28;
    --text: #eee0ff; --muted: #8878a0;
    --pink: #f472b6; --purple: #c084fc; --cyan: #67e8f9;
    --gold: #fbbf24; --mint: #6ee7b7;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'PingFang SC', 'Helvetica Neue', Helvetica, Arial, sans-serif;
    min-height: 100vh; display: flex; flex-direction: column;
    overflow: hidden; touch-action: manipulation; user-select: none; -webkit-user-select: none;
  }
  .top-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px; flex-shrink: 0;
    background: rgba(0,0,0,0.4);
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .back-btn { font-size: 1.4rem; background: none; border: none; color: #8888aa; cursor: pointer; text-decoration: none; padding: 4px 10px; }
  .top-title { font-size: 0.85rem; font-weight: 700; letter-spacing: 1px; background: linear-gradient(135deg, var(--pink), var(--purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .top-right { font-size: 0.68rem; color: var(--muted); }

  .diff-tabs {
    display: flex; gap: 6px; padding: 8px 14px; flex-shrink: 0;
    background: rgba(0,0,0,0.2);
    border-bottom: 1px solid rgba(255,255,255,0.05);
    justify-content: center;
  }
  .diff-tab {
    padding: 5px 14px; border-radius: 20px;
    font-size: 0.65rem; letter-spacing: 0.5px; font-weight: 600;
    border: 1.5px solid transparent;
    cursor: pointer; font-family: inherit; transition: all 0.2s;
  }
  .diff-tab.d0 { color: var(--muted); }
  .diff-tab.d1 { color: var(--muted); }
  .diff-tab.d2 { color: var(--muted); }
  .diff-tab.d0.on { color: var(--mint); border-color: var(--mint); background: rgba(110,231,183,0.1); }
  .diff-tab.d1.on { color: var(--gold); border-color: var(--gold); background: rgba(251,191,36,0.1); }
  .diff-tab.d2.on { color: var(--pink); border-color: var(--pink); background: rgba(244,114,182,0.1); }

  .pony-tabs {
    display: flex; gap: 6px; padding: 6px 14px 8px; flex-shrink: 0;
    background: rgba(0,0,0,0.15);
    border-bottom: 1px solid rgba(255,255,255,0.04);
    overflow-x: auto; justify-content: center;
  }
  .pony-tab {
    padding: 4px 12px; border-radius: 20px;
    font-size: 0.62rem; letter-spacing: 0.5px;
    border: 1.5px solid transparent;
    cursor: pointer; white-space: nowrap; font-family: inherit; transition: all 0.2s;
  }
  .pony-tab { color: var(--muted); }
  .pony-tab.on { color: var(--text); border-color: var(--purple); background: rgba(192,132,252,0.15); }

  .stats {
    display: flex; gap: 20px; align-items: center; justify-content: center;
    padding: 6px 14px; flex-shrink: 0;
  }
  .stat { display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .stat-lbl { font-size: 0.52rem; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; }
  .stat-val { font-size: 1rem; font-weight: 900; color: var(--purple); }
  .stat-val.moves { color: var(--pink); }
  .stat-val.time { color: var(--cyan); }

  .msg {
    font-size: 0.72rem; text-align: center; padding: 4px 14px;
    min-height: 26px; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; color: #6a6a8a; transition: all 0.3s;
  }
  .msg.win { color: var(--gold); font-weight: 700; animation: glow 0.8s ease infinite alternate; }
  @keyframes glow { from{text-shadow:0 0 6px rgba(251,191,36,0.4)} to{text-shadow:0 0 18px rgba(251,191,36,0.9)} }

  #canvasWrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 8px; }
  #puzzleCanvas { border-radius: 10px; box-shadow: 0 8px 30px rgba(0,0,0,0.6), 0 0 20px rgba(192,132,252,0.06); cursor: pointer; touch-action: none; }

  .btns {
    display: flex; gap: 8px; padding: 8px 14px 14px; flex-shrink: 0;
    background: rgba(0,0,0,0.25);
    border-top: 1px solid rgba(255,255,255,0.05);
  }
  .btn {
    flex: 1; padding: 11px 6px;
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
    color: #7888a8; font-size: 0.65rem; letter-spacing: 0.5px;
    cursor: pointer; border-radius: 10px; text-align: center;
    font-family: inherit; transition: all 0.15s;
  }
  .btn:active { background: rgba(255,255,255,0.12); transform: scale(0.97); }
  .btn-purple { color: var(--purple); border-color: rgba(192,132,252,0.3); background: rgba(192,132,252,0.08); }
  .btn-gold { color: var(--gold); border-color: rgba(251,191,36,0.25); background: rgba(251,191,36,0.07); }
</style>
</head>
<body>

<div class="top-bar">
  <a href="index.html" class="back-btn">←</a>
  <div class="top-title">🦄 小马宝莉拼图</div>
  <div class="top-right" id="diffLabel">3×3</div>
</div>

<div class="diff-tabs">
  <button class="diff-tab d0 on" id="dbtn3" onclick="setDiff(3)">3×3 简单</button>
  <button class="diff-tab d1" id="dbtn4" onclick="setDiff(4)">4×4 困难</button>
  <button class="diff-tab d2" id="dbtn5" onclick="setDiff(5)">5×5 超难</button>
</div>

<div class="pony-tabs">
  <button class="pony-tab on" id="ptab0" onclick="setPony(0)">🟣 紫悦</button>
  <button class="pony-tab" id="ptab1" onclick="setPony(1)">🩵 云宝</button>
  <button class="pony-tab" id="ptab2" onclick="setPony(2)">🩷 萍琪</button>
  <button class="pony-tab" id="ptab3" onclick="setPony(3)">🧡 苹果</button>
  <button class="pony-tab" id="ptab4" onclick="setPony(4)">💚 柔柔</button>
</div>

<div class="stats">
  <div class="stat"><div class="stat-lbl">步数</div><div class="stat-val moves" id="movesVal">0</div></div>
  <div class="stat"><div class="stat-lbl">用时</div><div class="stat-val time" id="timeVal">0:00</div></div>
</div>

<div class="msg" id="msgEl">点击滑动拼图，数字按顺序排列即可通关</div>

<div id="canvasWrap">
  <canvas id="puzzleCanvas"></canvas>
</div>

<div class="btns">
  <button class="btn btn-purple" onclick="newPuzzle()">🆕 新拼图</button>
  <button class="btn" onclick="preview()">👁 预览原图</button>
  <button class="btn btn-gold" onclick="toggleHint()">💡 提示</button>
</div>

<script>
// ─── Rounded rect polyfill (no ctx.roundRect) ──────────────
function roundRect(ctx, x, y, w, h, r) {
  if (typeof ctx.roundRect === 'function') {
    ctx.roundRect(x, y, w, h, r);
  } else {
    const rad = typeof r === 'number' ? r : (Array.isArray(r) ? r[0] : 0);
    ctx.moveTo(x + rad, y);
    ctx.lineTo(x + w - rad, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + rad);
    ctx.lineTo(x + w, y + h - rad);
    ctx.quadraticCurveTo(x + w, y + h, x + w - rad, y + h);
    ctx.lineTo(x + rad, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - rad);
    ctx.lineTo(x, y + rad);
    ctx.quadraticCurveTo(x, y, x + rad, y);
    ctx.closePath();
  }
}

// ─── Constants ─────────────────────────────────────────────
const PONY_COLORS = [
  { color: '#9333EA', color2: '#C084FC', mane: '#6D28D9', eye: '#7C3AED', name: '紫悦' },
  { color: '#0EA5E9', color2: '#38BDF8', mane: '#0284C7', eye: '#0EA5E9', name: '云宝' },
  { color: '#EC4899', color2: '#F472B6', mane: '#BE185D', eye: '#EC4899', name: '萍琪' },
  { color: '#EA580C', color2: '#F97316', mane: '#9A3412', eye: '#EA580C', name: '苹果' },
  { color: '#16A34A', color2: '#4ADE80', mane: '#15803D', eye: '#16A34A', name: '柔柔' },
];

let GRID = 3, CANVAS_SZ = 300, CELL_SZ = 100;
let board = [];       // board[i] = tile value (1..n-1, or 0 for empty)
let solved = false, previewMode = false, hintActive = false;
let moves = 0, elapsed = 0;
let timerInterval = null;
let ponyIdx = 0;

const canvas = document.getElementById('puzzleCanvas');
const ctx = canvas.getContext('2d');

function initGame() {
  clearInterval(timerInterval);
  board = [];
  const total = GRID * GRID;
  for (let i = 0; i < total - 1; i++) board.push(i + 1);
  board.push(0);
  shuffleBoard();
  moves = 0; solved = false; previewMode = false;
  document.getElementById('movesVal').textContent = '0';
  document.getElementById('msgEl').textContent = '点击滑动拼图，数字按顺序排列即可通关';
  document.getElementById('msgEl').className = 'msg';
  adaptSize();
  render();
  startTimer();
}

function shuffleBoard() {
  let emptyIdx = board.indexOf(0);
  for (let i = 0; i < GRID * GRID * 50; i++) {
    const nb = getNeighbors(emptyIdx);
    const ni = nb[Math.floor(Math.random() * nb.length)];
    [board[emptyIdx], board[ni]] = [board[ni], board[emptyIdx]];
    emptyIdx = ni;
  }
  if (!isSolvable() || isWin()) shuffleBoard();
}

function getNeighbors(idx) {
  const r = Math.floor(idx / GRID), c = idx % GRID, nb = [];
  if (r > 0) nb.push(idx - GRID);
  if (r < GRID - 1) nb.push(idx + GRID);
  if (c > 0) nb.push(idx - 1);
  if (c < GRID - 1) nb.push(idx + 1);
  return nb;
}

function isSolvable() {
  let inv = 0;
  const flat = board.filter(n => n !== 0);
  for (let i = 0; i < flat.length; i++)
    for (let j = i + 1; j < flat.length; j++)
      if (flat[i] > flat[j]) inv++;
  if (GRID % 2 === 1) return inv % 2 === 0;
  const emptyRow = GRID - 1 - Math.floor(board.indexOf(0) / GRID);
  return (inv + emptyRow) % 2 === 1;
}

function isWin() {
  const total = GRID * GRID;
  for (let i = 0; i < total - 1; i++) if (board[i] !== i + 1) return false;
  return board[total - 1] === 0;
}

function startTimer() {
  elapsed = 0;
  document.getElementById('timeVal').textContent = '0:00';
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    elapsed++;
    const m = Math.floor(elapsed / 60), s = elapsed % 60;
    document.getElementById('timeVal').textContent = `${m}:${s.toString().padStart(2, '0')}`;
  }, 1000);
}

function adaptSize() {
  const sz = Math.min(window.innerWidth - 24, 380);
  CANVAS_SZ = Math.floor(sz / GRID) * GRID;
  CELL_SZ = CANVAS_SZ / GRID;
  canvas.width = CANVAS_SZ;
  canvas.height = CANVAS_SZ;
  canvas.style.width = CANVAS_SZ + 'px';
  canvas.style.height = CANVAS_SZ + 'px';
}

function render() {
  const p = PONY_COLORS[ponyIdx];
  ctx.clearRect(0, 0, CANVAS_SZ, CANVAS_SZ);

  for (let i = 0; i < board.length; i++) {
    const r = Math.floor(i / GRID), c = i % GRID;
    const val = board[i];
    const x = c * CELL_SZ, y = r * CELL_SZ;
    const isHint = hintActive && val !== 0 && val === i + 1;
    drawTile(x, y, val, p, isHint);
  }

  // Grid lines
  ctx.strokeStyle = 'rgba(0,0,0,0.4)';
  ctx.lineWidth = 1;
  for (let i = 0; i <= GRID; i++) {
    ctx.beginPath(); ctx.moveTo(i * CELL_SZ, 0); ctx.lineTo(i * CELL_SZ, CANVAS_SZ); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, i * CELL_SZ); ctx.lineTo(CANVAS_SZ, i * CELL_SZ); ctx.stroke();
  }
}

function drawTile(x, y, val, p, isHint) {
  const pad = 2;
  const sz = CELL_SZ - pad * 2;
  const radius = Math.max(4, CELL_SZ * 0.1);

  if (val === 0) {
    // Empty slot
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    ctx.beginPath();
    roundRect(ctx, x + pad, y + pad, sz, sz, radius);
    ctx.fill();
    ctx.strokeStyle = 'rgba(192,132,252,0.18)';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([3, 3]);
    ctx.beginPath();
    roundRect(ctx, x + pad, y + pad, sz, sz, radius);
    ctx.stroke();
    ctx.setLineDash([]);
    return;
  }

  // Background gradient
  const grad = ctx.createLinearGradient(x + pad, y + pad, x + pad + sz, y + pad + sz);
  grad.addColorStop(0, p.color);
  grad.addColorStop(0.5, p.color2);
  grad.addColorStop(1, p.color);
  ctx.fillStyle = grad;
  ctx.beginPath();
  roundRect(ctx, x + pad, y + pad, sz, sz, radius);
  ctx.fill();

  // Shine stripe
  ctx.fillStyle = 'rgba(255,255,255,0.06)';
  ctx.beginPath();
  roundRect(ctx, x + pad, y + pad, sz, sz / 3, radius);
  ctx.fill();

  // Border
  const borderColor = isHint ? 'rgba(251,191,36,0.85)' : 'rgba(255,255,255,0.2)';
  const borderWidth = isHint ? 3 : 1.5;
  ctx.strokeStyle = borderColor;
  ctx.lineWidth = borderWidth;
  ctx.beginPath();
  roundRect(ctx, x + pad, y + pad, sz, sz, radius);
  ctx.stroke();

  // Pony face in tile
  const cx = x + CELL_SZ / 2;
  const cy = y + CELL_SZ / 2;
  const faceR = sz * 0.28;

  ctx.beginPath();
  ctx.arc(cx, cy, faceR, 0, Math.PI * 2);
  ctx.fillStyle = p.color;
  ctx.fill();

  // Eyes
  const eyeR = sz * 0.07;
  const eyeY = cy - sz * 0.02;
  [[cx - sz * 0.1, eyeY], [cx + sz * 0.1, eyeY]].forEach(([ex, ey]) => {
    ctx.beginPath(); ctx.arc(ex, ey, eyeR, 0, Math.PI * 2); ctx.fillStyle = '#fff'; ctx.fill();
    ctx.beginPath(); ctx.arc(ex, ey, eyeR * 0.55, 0, Math.PI * 2); ctx.fillStyle = '#111'; ctx.fill();
    ctx.beginPath(); ctx.arc(ex - eyeR * 0.2, ey - eyeR * 0.2, eyeR * 0.25, 0, Math.PI * 2); ctx.fillStyle = '#fff'; ctx.fill();
  });

  // Mane tuft
  ctx.beginPath();
  ctx.ellipse(cx, cy - faceR * 0.7, faceR * 0.4, faceR * 0.3, 0, Math.PI, 0);
  ctx.fillStyle = p.mane;
  ctx.fill();

  // Number
  ctx.fillStyle = 'rgba(255,255,255,0.92)';
  ctx.font = `bold ${Math.floor(sz * 0.22)}px 'Courier New', monospace`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(val, cx, cy + sz * 0.22);
}

canvas.addEventListener('click', (e) => {
  if (solved || isAnimating()) return;
  const rect = canvas.getBoundingClientRect();
  const sx = CANVAS_SZ / rect.width;
  const sy = CANVAS_SZ / rect.height;
  const col = Math.floor((e.clientX - rect.left) * sx / CELL_SZ);
  const row = Math.floor((e.clientY - rect.top) * sy / CELL_SZ);
  if (col < 0 || col >= GRID || row < 0 || row >= GRID) return;
  const idx = row * GRID + col;
  const emptyIdx = board.indexOf(0);
  if (getNeighbors(idx).includes(emptyIdx)) {
    hintActive = false;
    [board[idx], board[emptyIdx]] = [board[emptyIdx], board[idx]];
    moves++;
    document.getElementById('movesVal').textContent = moves;
    render();
    if (isWin()) onWin();
  }
});

let animating = false;
function isAnimating() { return animating; }

function onWin() {
  solved = true;
  clearInterval(timerInterval);
  const bonus = Math.max(0, 100 - moves - elapsed);
  const total = bonus + Math.max(0, 500 - moves * 3 - elapsed * 2);
  document.getElementById('msgEl').innerHTML = `🎉 通关！得分 ${total}，用时 ${fmtTime(elapsed)}，步数 ${moves}`;
  document.getElementById('msgEl').className = 'msg win';
  // Win highlight
  setTimeout(() => {
    render();
    for (let i = 0; i < board.length; i++) {
      const r = Math.floor(i / GRID), c = i % GRID;
      drawTile(c * CELL_SZ, r * CELL_SZ, board[i], PONY_COLORS[ponyIdx], true);
    }
  }, 100);
}

function fmtTime(s) {
  const m = Math.floor(s / 60), sec = s % 60;
  return `${m}:${sec.toString().padStart(2, '0')}`;
}

function toggleHint() {
  hintActive = !hintActive;
  render();
  if (hintActive) {
    document.getElementById('msgEl').textContent = '💡 绿色边框为正确位置（3秒后消失）';
    setTimeout(() => { hintActive = false; render(); }, 3000);
  } else {
    document.getElementById('msgEl').textContent = '点击滑动拼图，数字按顺序排列即可通关';
  }
}

function preview() {
  previewMode = !previewMode;
  render();
  document.getElementById('msgEl').textContent = previewMode ? '👁 预览模式：查看完整拼图' : '点击滑动拼图，数字按顺序排列即可通关';
  document.getElementById('msgEl').className = 'msg';
}

function setDiff(d) {
  GRID = d;
  document.getElementById('dbtn3').className = 'diff-tab d0' + (d === 3 ? ' on' : '');
  document.getElementById('dbtn4').className = 'diff-tab d1' + (d === 4 ? ' on' : '');
  document.getElementById('dbtn5').className = 'diff-tab d2' + (d === 5 ? ' on' : '');
  document.getElementById('diffLabel').textContent = `${d}×${d}`;
  hintActive = false; previewMode = false;
  initGame();
}

function setPony(idx) {
  ponyIdx = idx;
  for (let i = 0; i < PONY_COLORS.length; i++)
    document.getElementById('ptab' + i).className = 'pony-tab' + (i === idx ? ' on' : '');
  hintActive = false; previewMode = false; solved = false;
  render();
}

function newPuzzle() {
  hintActive = false; previewMode = false;
  initGame();
}

window.addEventListener('resize', () => { adaptSize(); render(); });
adaptSize();
initGame();
</script>
</body>
</html>
