<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>井字棋 · Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
      color: #fff;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    .top-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px; background: rgba(0,0,0,0.2);
    }
    .back-btn { color: #fff; text-decoration: none; font-size: 1.4rem; }
    .top-title { font-size: 1.1rem; font-weight: 600; }
    .status { font-size: 0.95rem; color: #a5b4fc; }

    .game-area {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    .board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      width: 100%; max-width: 320px;
      aspect-ratio: 1;
    }
    .cell {
      display: flex; align-items: center; justify-content: center;
      font-size: 3rem;
      background: rgba(255,255,255,0.08);
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.15s;
      user-select: none;
    }
    .cell:active { background: rgba(255,255,255,0.15); }
    .cell.x { color: #60a5fa; }
    .cell.o { color: #f472b6; }
    .cell.winner { background: rgba(74,222,128,0.2); }
    .cell.tie { background: rgba(251,191,36,0.15); }

    .controls {
      display: flex; gap: 12px; padding: 16px;
      background: rgba(0,0,0,0.15);
    }
    .btn {
      flex: 1; padding: 14px; border: none; border-radius: 10px;
      font-size: 1rem; cursor: pointer;
      background: rgba(255,255,255,0.1); color: #fff;
    }
    .btn:active { transform: scale(0.97); }
  </style>
</head>
<body>

<div class="top-bar">
  <a href="index.html" class="back-btn">←</a>
  <div class="top-title">井字棋 · Tic Tac Toe</div>
  <div class="status" id="status">你的回合 (X)</div>
</div>

<div class="game-area">
  <div class="board" id="board"></div>
</div>

<div class="controls">
  <button class="btn" onclick="undo()">↩ 悔棋</button>
  <button class="btn" onclick="newGame()">🆕 新游戏</button>
</div>

<script>
const SIZE = 3;
let board = [];
let history = [];
let currentPlayer = 'X'; // X=玩家, O=AI
let gameOver = false;
let winner = null;

const boardEl = document.getElementById('board');
const statusEl = document.getElementById('status');

function init() {
  board = Array(SIZE).fill(null).map(() => Array(SIZE).fill(null));
  history = [];
  currentPlayer = 'X';
  gameOver = false;
  winner = null;
  render();
}

function render() {
  boardEl.innerHTML = '';
  for (let r = 0; r < SIZE; r++) {
    for (let c = 0; c < SIZE; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      if (board[r][c]) {
        cell.classList.add(board[r][c].toLowerCase());
        cell.textContent = board[r][c];
      }
      if (winner && isWinnerCell(r, c)) {
        cell.classList.add('winner');
      }
      if (!winner && history.length === SIZE * SIZE) {
        cell.classList.add('tie');
      }
      cell.onclick = () => onClick(r, c);
      boardEl.appendChild(cell);
    }
  }
  updateStatus();
}

function onClick(r, c) {
  if (gameOver || board[r][c]) return;
  
  board[r][c] = currentPlayer;
  history.push({ r, c, player: currentPlayer });
  
  if (checkWin(currentPlayer)) {
    gameOver = true;
    winner = currentPlayer;
    render();
    return;
  }
  
  if (history.length === SIZE * SIZE) {
    gameOver = true;
    render();
    return;
  }
  
  currentPlayer = 'O';
  render();
  
  if (!gameOver) {
    setTimeout(aiMove, 400);
  }
}

function updateStatus() {
  if (winner) {
    statusEl.textContent = winner === 'X' ? '🎉 你赢了！' : '💀 AI赢了';
    statusEl.style.color = winner === 'X' ? '#4ade80' : '#f87171';
  } else if (gameOver) {
    statusEl.textContent = '🤝 平局！';
    statusEl.style.color = '#fbbf24';
  } else {
    statusEl.textContent = currentPlayer === 'X' ? '你的回合 (X)' : 'AI思考中... (O)';
    statusEl.style.color = '#a5b4fc';
  }
}

function checkWin(player) {
  // 行
  for (let r = 0; r < SIZE; r++) {
    if (board[r].every(cell => cell === player)) return true;
  }
  // 列
  for (let c = 0; c < SIZE; c++) {
    let ok = true;
    for (let r = 0; r < SIZE; r++) {
      if (board[r][c] !== player) { ok = false; break; }
    }
    if (ok) return true;
  }
  // 对角线
  if (board[0][0] === player && board[1][1] === player && board[2][2] === player) return true;
  if (board[0][2] === player && board[1][1] === player && board[2][0] === player) return true;
  return false;
}

function isWinnerCell(r, c) {
  if (!winner) return false;
  // 检查该坐标是否在获胜线上
  // 行
  if (board[r].every(cell => cell === winner)) return true;
  // 列
  for (let rr = 0; rr < SIZE; rr++) {
    if (board[rr][c] !== winner) break;
    if (rr === SIZE - 1) return true;
  }
  // 对角线
  if (r === c && board[0][0] === winner && board[1][1] === winner && board[2][2] === winner) return true;
  if (r + c === 2 && board[0][2] === winner && board[1][1] === winner && board[2][0] === winner) return true;
  return false;
}

function aiMove() {
  // 简单的 AI：找空位
  let empty = [];
  for (let r = 0; r < SIZE; r++) {
    for (let c = 0; c < SIZE; c++) {
      if (!board[r][c]) empty.push({ r, c });
    }
  }
  
  if (empty.length === 0) return;
  
  // 优先占中心，然后角落
  const center = { r: 1, c: 1 };
  if (!board[1][1]) {
    onClick(1, 1);
    return;
  }
  
  // 随机选一个
  const move = empty[Math.floor(Math.random() * empty.length)];
  onClick(move.r, move.c);
}

function undo() {
  if (history.length === 0) return;
  history.pop();
  
  board = Array(SIZE).fill(null).map(() => Array(SIZE).fill(null));
  for (const move of history) {
    board[move.r][move.c] = move.player;
  }
  
  currentPlayer = 'X';
  gameOver = false;
  winner = null;
  render();
}

function newGame() {
  init();
}

init();
</script>
</body>
</html>
